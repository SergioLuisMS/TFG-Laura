# Virtual host para Railway.
# El puerto :80 lo reescribe el entrypoint al valor de $PORT que inyecta Railway.
<VirtualHost *:80>
    # Laravel sirve desde la carpeta public/, no desde la raiz del proyecto.
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        # Permito que public/.htaccess (el front controller de Laravel) funcione.
        AllowOverride All
        Require all granted
    </Directory>

    # Mando los logs a la salida estandar para que Railway los capture.
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
